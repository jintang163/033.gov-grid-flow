server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: gov-grid-flow-backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/gov_grid_flow?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

flowable:
  async-executor-activate: false
  database-schema-update: true
  history-level: full
  idm-engine-enabled: false
  form-enabled: false
  content-storage-enabled: false
  dmn-enabled: false
  cmmn-enabled: false
  process-definition-location-prefix: classpath*:/processes/

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.gov.grid.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

rocketmq:
  name-server: localhost:9876
  producer:
    group: gov-grid-flow-producer-group
  consumer:
    group: gov-grid-flow-consumer-group

jwt:
  secret: gov-grid-flow-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000
  header: Authorization
  prefix: Bearer

file:
  upload:
    path: ./uploads
  access:
    prefix: /file

watermark:
  font:
    size: 14
    color: '#FF0000'
  opacity: 0.3

asr:
  mock:
    enabled: true

cv:
  mock:
    enabled: true
  similarity-threshold: 60.0

urge:
  cron: "0 */5 * * * ?"
  default-time-limit-hours: 24
  default-warning-ratio: 0.20
  escalate-after-hours: 24

  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 10s
    read-timeout: 30s

nlp:
  service:
    url: http://localhost:8001
  sentiment:
    enabled: true
    provider: baidu
  baidu:
    client-id: 
    client-secret: 
  xunfei:
    app-id: 
    api-key: 
    api-secret: 
  dispatch:
    enabled: true
    auto-dispatch-enabled: true
    confidence-threshold: 0.8
    auto-train-enabled: true
    auto-train-cron: "0 0 2 * * ?"

blockchain:
  mock: true
  chain-name: 司法联盟链
  node-url: ""
  contract-address: ""
  private-key: ""

logging:
  level:
    root: info
    com.gov.grid: debug
    org.flowable: info

audit:
  enabled: true
  retention-years: 2
  hash-salt: gov-grid-flow-audit-log-salt-2024
  es-write-enabled: true
  mq-enabled: true
  file-backup: true
  file-backup-path: ./logs/audit
  readonly-previous-months: true
