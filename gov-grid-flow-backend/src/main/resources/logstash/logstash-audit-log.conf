# ============================================================
# Logstash Pipeline: 审计日志集中采集入库
# 数据源：RocketMQ Topic (audit-log-topic)
# 目标：Elasticsearch (audit_log-YYYYMM 按月索引)
# ============================================================

input {
  rocketmq {
    namesrv_addr => "localhost:9876"
    consumer_group => "logstash-audit-log-consumer"
    topic => "audit-log-topic"
    codec => json {
      charset => "UTF-8"
    }
  }

  # 备用通道：直接从应用日志文件采集（如RocketMQ不可用）
  file {
    path => ["./logs/audit/*.log"]
    start_position => "beginning"
    sincedb_path => "./logs/audit/sincedb"
    codec => json_lines {
      charset => "UTF-8"
    }
    tags => ["audit-file"]
  }
}

filter {
  # ===== 字段类型转换 =====
  mutate {
    convert => {
      "userId" => "string"
      "status" => "integer"
      "costTime" => "integer"
    }
  }

  # ===== 时间字段解析（createdAt -> @timestamp） =====
  date {
    match => ["createdAt", "yyyy-MM-dd HH:mm:ss", "ISO8601"]
    target => "@timestamp"
    timezone => "Asia/Shanghai"
  }

  # ===== 根据createdAt计算目标索引后缀（YYYYMM） =====
  ruby {
    code => '
      created_at = event.get("createdAt")
      if created_at
        dt = DateTime.parse(created_at)
        index_suffix = dt.strftime("%Y%m")
        event.set("[@metadata][index_suffix]", index_suffix)
      else
        event.set("[@metadata][index_suffix]", Time.now.strftime("%Y%m"))
      end
    '
  }

  # ===== 脱敏：清理敏感字段 =====
  if [requestParams] {
    mutate {
      gsub => [
        "requestParams", "\"password\"\s*:\s*\"[^\"]+\"", "\"password\":\"******\"",
        "requestParams", "\"oldPassword\"\s*:\s*\"[^\"]+\"", "\"oldPassword\":\"******\"",
        "requestParams", "\"newPassword\"\s*:\s*\"[^\"]+\"", "\"newPassword\":\"******\"",
        "requestParams", "\"token\"\s*:\s*\"[^\"]+\"", "\"token\":\"******\"",
        "requestParams", "\"privateKey\"\s*:\s*\"[^\"]+\"", "\"privateKey\":\"******\""
      ]
    }
  }

  # ===== 去重：以文档id为幂等键 =====
  if [id] {
    mutate {
      add_field => { "[@metadata][document_id]" => "%{id}" }
    }
  }
}

output {
  # ===== 主通道：写入Elasticsearch =====
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "audit_log-%{[@metadata][index_suffix]}"
    document_id => "%{[@metadata][document_id]}"
    action => "create"
    doc_as_upsert => false
    manage_template => false
    template_name => "audit-log-template"
  }

  # ===== 调试通道：控制台输出（生产环境注释掉）=====
  # stdout {
  #   codec => rubydebug { metadata => true }
  # }

  # ===== 备份通道：同步落盘到文件（防ES宕机丢失）=====
  file {
    path => "./logs/audit/audit-log-backup-%{+YYYYMMdd}.log"
    codec => json_lines { charset => "UTF-8" }
    flush_interval => 5
  }
}
